name: Update repo.json

# Rebuilds repo.json from the latest GitHub release of each plugin in plugins.txt.
# Reads version + API level from the manifest inside each release's latest.zip, so
# nothing here needs updating when a plugin releases — just re-run (schedule/manual).
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-released]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild repo.json from plugin releases
        run: |
          set -euo pipefail
          entries=()
          while IFS= read -r repo || [ -n "$repo" ]; do
            repo="$(echo "$repo" | tr -d '[:space:]')"
            [ -z "$repo" ] && continue
            case "$repo" in \#*) continue ;; esac

            base="https://github.com/$repo/releases/latest/download"
            if ! curl -sfL "$base/latest.zip" -o plugin.zip; then
              echo "::warning::no latest.zip for $repo"; continue
            fi

            rm -rf ext && mkdir ext && unzip -oq plugin.zip -d ext
            manifest="$(grep -rl '"AssemblyVersion"' ext --include='*.json' | head -1 || true)"
            if [ -z "$manifest" ]; then echo "::warning::no manifest in $repo"; continue; fi

            entry="$(jq --arg base "$base" --arg repo "$repo" '{
              Author,
              Name,
              InternalName: (.InternalName // (.Name | gsub(" "; ""))),
              AssemblyVersion,
              Description,
              ApplicableVersion: (.ApplicableVersion // "any"),
              DalamudApiLevel,
              RepoUrl: ("https://github.com/" + $repo),
              Tags: (.Tags // []),
              DownloadLinkInstall: ($base + "/latest.zip"),
              DownloadLinkUpdate: ($base + "/latest.zip"),
              DownloadLinkTesting: ($base + "/latest.zip")
            }' "$manifest")"
            entries+=("$entry")
          done < plugins.txt

          printf '%s\n' "${entries[@]}" | jq -s '.' > repo.json
          echo "--- repo.json ---"; cat repo.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          if git diff --cached --quiet; then
            echo "repo.json unchanged"
          else
            git commit -m "Update repo.json from plugin releases"
            git push
          fi
